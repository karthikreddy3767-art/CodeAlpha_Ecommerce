<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        p{
            text-align:center;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Enter Name"
required>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">
Register
</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="js/register.js"></script>

</body>
</html>
